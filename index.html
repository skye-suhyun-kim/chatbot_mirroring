<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOBOT</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #F5F0EB;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
}
.wrap { width: 100%; max-width: 500px; }
.token-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; padding: 0 4px;
}
.token-label { font-size: 12px; color: #777; }
.token-dots { display: flex; gap: 4px; flex-wrap: wrap; }
.tok { width: 12px; height: 12px; border-radius: 50%; background: #d8cfc4; }
.tok.on { background: #6B8E7F; }
.chat-header {
  display: flex; align-items: center; gap: 6px; padding: 12px 16px;
  background: #fff; border-radius: 16px 16px 0 0; border-bottom: 1px solid #f0f0f0;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
.chat-title { font-size: 13px; font-weight: 600; margin-left: 6px; color: #444; }
.chat-body {
  background: #fff; padding: 16px; min-height: 380px; max-height: 380px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
}
.mrow { display: flex; flex-direction: column; }
.mrow.user { align-items: flex-end; }
.mrow.bot { align-items: flex-start; }
.spk { font-size: 11px; color: #aaa; margin-bottom: 3px; }
.bubble {
  max-width: 82%; padding: 9px 13px; border-radius: 14px;
  font-size: 13px; line-height: 1.65; word-break: keep-all;
}
.bubble.user { background: #ECE6DF; color: #222; border-bottom-right-radius: 4px; }
.bubble.bot { background: #EAF1ED; color: #1f3a30; border-bottom-left-radius: 4px; }
.bubble.typing { opacity: 0.5; }
.chat-input-row {
  display: flex; gap: 8px; padding: 12px 14px; background: #fff;
  border-top: 1px solid #f0f0f0; border-radius: 0 0 16px 16px;
}
.chat-input {
  flex: 1; border: 1px solid #e0e0e0; border-radius: 20px;
  padding: 9px 14px; font-size: 13px; font-family: inherit;
  outline: none; background: #fafafa;
}
.chat-input:focus { border-color: #aaa; background: #fff; }
.send-btn {
  padding: 9px 18px; border-radius: 20px; border: none;
  font-size: 13px; font-family: inherit; font-weight: 600;
  cursor: pointer; background: #6B8E7F; color: #fff;
}
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.done-box {
  margin-top: 16px; padding: 20px; background: #fff;
  border-radius: 16px; text-align: center; display: none;
}
.done-box.show { display: block; }
.done-box h3 { font-size: 15px; color: #333; margin-bottom: 10px; }
.done-box p { font-size: 13px; color: #666; margin-bottom: 14px; line-height: 1.6; }
.code {
  font-size: 22px; font-weight: 700; letter-spacing: 2px;
  color: #6B8E7F; background: #EAF1ED; padding: 12px;
  border-radius: 10px; margin-bottom: 6px;
}
.err { color: #c0392b; font-size: 12px; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="token-bar">
    <span class="token-label">남은 메시지</span>
    <div class="token-dots" id="tokens"></div>
  </div>
  <div class="chat-header">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span class="chat-title">GOBOT</span>
  </div>
  <div class="chat-body" id="cbody"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="inp" type="text" placeholder="메시지를 입력하세요..."
      onkeydown="if(event.key==='Enter'&&!event.isComposing)window.send()" />
    <button class="send-btn" id="sbtn" onclick="window.send()">전송</button>
  </div>
  <div class="err" id="err"></div>

  <div class="done-box" id="done">
    <h3>대화가 종료되었습니다</h3>
    <p>아래 완료 코드를 설문에 입력해 주세요.</p>
    <div class="code" id="code">—</div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const cond = params.get('c') === 'n' ? 'n' : 'm';

const TOTAL_TOKENS = 12;
let tokensLeft = TOTAL_TOKENS;
let hist = [];
let loading = false;

const PROMPTS = {
  m: `너는 정서적 지지를 해주는 한국어 챗봇이야. 가장 중요한 규칙은 하나야: 사용자가 쓴 종결어미 스타일을 그대로 따라 쓰되, 사용자 문장 자체를 반복하거나 복사하지는 마.

[절대 금지] 사용자가 방금 쓴 문장이나 단어를 그대로 따라 말하면서 응답을 시작하는 것. 너는 항상 새로운 문장을 만들어야 해 — 어미 스타일만 같게, 내용과 표현은 네가 새로 구성해.

아래 예시를 보고 패턴을 익혀 (예시 표현을 그대로 외워 쓰지 말고, "어미를 맞추되 새 문장을 쓴다"는 원리만 가져갈 것):

사용자: "힘들당 ㅠㅠ" → 너: "마음이 많이 지쳤겠당 ㅠㅠ 무슨 일 때문에 그래?"
사용자: "너무 힘들엉..." → 너: "고생이 많았겠엉... 무슨 일 있었어엉?"
사용자: "좋아용 ㅎㅎ" → 너: "다행이당 ㅎㅎ 요즘 기분 좋은 일 있었어용?"
사용자: "모르겠어" → 너: "그럴 수 있어. 뭐가 제일 걸려?"
사용자: "힘들어요 ㅠ" → 너: "마음이 많이 무거우셨겠어요 ㅠ 어떤 부분이 가장 힘드세요?"
사용자: "진짜 모르겠다" → 너: "답답한 마음 이해돼. 어디서부터 막막한 거야?"
사용자: "너무 지쳐요" → 너: "최근에 쉴 틈이 없으셨나 봐요. 무엇 때문에 가장 지치셨어요?"
사용자: "힘드네요 ㅠ" → 너: "마음 고생이 크셨겠네요 ㅠ 어떤 일이 있으셨어요?"

핵심: ① 종결어미 스타일(반말/존댓말, ~엉/~당/~용 등)만 맞추기 ② 사용자 문장·단어를 그대로 복사하지 않고 매번 새로운 표현으로 공감 표현하기 ③ "넘","진짜","완전" 같은 일반 어휘는 자연스러운 선에서만 활용. 응답은 2~3문장.`,
  n: `당신은 정서적 지지를 제공하는 한국어 챗봇입니다.

[절대 규칙: 격식체만 사용]
- 항상 "~합니다/~입니다/~하십니까/~주시겠습니까"만 사용. 사용자 말투와 무관하게 유지.
- "진짜/너무/완전/넘" 같은 구어체 절대 금지. "매우/상당히/다소" 사용.
- ㅠㅠ/ㅋㅋ/ㅎㅎ/이모지 절대 금지.
- "~해요/~어요/~죠/~야/~해/~당/~엉/~양" 사용 절대 금지.
- 응답은 2~3문장. 공감과 경청 중심.`
};

const WELCOME = {
  m: '안녕하세요 저는 여러분의 고민을 들어주는 챗봇 GOBOT입니다. 요즘 고민되는 일들을 저에게 편하게 말씀해주세요',
  n: '안녕하세요 저는 여러분의 고민을 들어주는 챗봇 GOBOT입니다. 요즘 고민되는 일들을 저에게 편하게 말씀해주세요.'
};

function renderTokens() {
  const c = document.getElementById('tokens');
  c.innerHTML = '';
  for (let i = 0; i < TOTAL_TOKENS; i++) {
    const d = document.createElement('div');
    d.className = 'tok' + (i < tokensLeft ? ' on' : '');
    c.appendChild(d);
  }
}

function addMsg(role, text) {
  const body = document.getElementById('cbody');
  const row = document.createElement('div');
  row.className = 'mrow ' + role;
  const spk = document.createElement('span');
  spk.className = 'spk';
  spk.textContent = role === 'user' ? '나' : 'GOBOT';
  const b = document.createElement('div');
  b.className = 'bubble ' + (role === 'user' ? 'user' : 'bot');
  b.textContent = text;
  row.appendChild(spk); row.appendChild(b);
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

window.send = async function() {
  if (loading || tokensLeft <= 0) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  loading = true;
  inp.value = '';
  document.getElementById('sbtn').disabled = true;
  document.getElementById('err').textContent = '';

  addMsg('user', text);
  hist.push({ role: 'user', content: text });

  tokensLeft--;
  renderTokens();

  const body = document.getElementById('cbody');
  const tr = document.createElement('div');
  tr.className = 'mrow bot'; tr.id = 'typing';
  const ts = document.createElement('span'); ts.className = 'spk'; ts.textContent = '챗봇';
  const tb = document.createElement('div'); tb.className = 'bubble bot typing'; tb.textContent = '...';
  tr.appendChild(ts); tr.appendChild(tb);
  body.appendChild(tr); body.scrollTop = body.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: PROMPTS[cond], messages: hist })
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();

    if (data.reply) {
      hist.push({ role: 'assistant', content: data.reply });
      addMsg('bot', data.reply);
    } else {
      document.getElementById('err').textContent = '응답 오류가 발생했습니다. 다시 시도해 주세요.';
      tokensLeft++; renderTokens();
    }
  } catch (e) {
    document.getElementById('typing')?.remove();
    document.getElementById('err').textContent = '네트워크 오류가 발생했습니다.';
    tokensLeft++; renderTokens();
  }

  loading = false;

  if (tokensLeft <= 0) {
    endConversation();
  } else {
    document.getElementById('sbtn').disabled = false;
    inp.focus();
  }
}

function endConversation() {
  document.getElementById('inp').disabled = true;
  document.getElementById('sbtn').disabled = true;
  document.getElementById('inp').placeholder = '대화가 종료되었습니다';

  const rand = Math.random().toString(36).substring(2, 8).toUpperCase();
  const code = (cond === 'm' ? 'MIR-' : 'NON-') + rand;
  document.getElementById('code').textContent = code;
  document.getElementById('done').classList.add('show');
}

renderTokens();
addMsg('bot', WELCOME[cond]);
hist.push({ role: 'assistant', content: WELCOME[cond] });
</script>
</body>
</html>
